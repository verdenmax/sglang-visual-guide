name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build site and print editions
        run: |
          cd src
          python3 build.py
          python3 build_print.py
      - name: Validate HTML and links
        run: |
          cd src
          python3 check_html.py
          python3 check_links.py
      - name: Ensure committed output is in sync with sources
        run: |
          git add -A
          git diff --cached --exit-code

  print-pdf:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build print editions
        run: |
          cd src
          python3 build.py
          python3 build_print.py
      - name: Install chromium
        run: sudo apt-get update && sudo apt-get install -y chromium-browser || sudo apt-get install -y chromium
      - name: Render PDFs
        run: |
          BIN="$(command -v chromium || command -v chromium-browser)"
          "$BIN" --headless --no-sandbox --print-to-pdf=sglang-visual-guide-zh.pdf print_zh.html
          "$BIN" --headless --no-sandbox --print-to-pdf=sglang-visual-guide-en.pdf print_en.html
      - uses: actions/upload-artifact@v4
        with:
          name: guide-pdfs
          path: '*.pdf'
